services:
  - type: web
    name: jizhang-system
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 4 index:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: WORKER_RUNTIME
        value: "render"
